apply plugin: 'com.android.application'

android {
    namespace = "app.vercel.iptvmatplayer"
    compileSdk = rootProject.ext.compileSdkVersion

    def releaseProperties = new Properties()
    def releasePropertiesFile = rootProject.file("release-signing.properties")
    if (releasePropertiesFile.exists()) {
        releasePropertiesFile.withInputStream { releaseProperties.load(it) }
    }
    def releaseStoreFile = project.findProperty("IPTV_MAT_UPLOAD_STORE_FILE") ?: System.getenv("IPTV_MAT_UPLOAD_STORE_FILE") ?: releaseProperties.getProperty("IPTV_MAT_UPLOAD_STORE_FILE")
    def releaseStorePassword = project.findProperty("IPTV_MAT_UPLOAD_STORE_PASSWORD") ?: System.getenv("IPTV_MAT_UPLOAD_STORE_PASSWORD") ?: releaseProperties.getProperty("IPTV_MAT_UPLOAD_STORE_PASSWORD")
    def releaseKeyAlias = project.findProperty("IPTV_MAT_UPLOAD_KEY_ALIAS") ?: System.getenv("IPTV_MAT_UPLOAD_KEY_ALIAS") ?: releaseProperties.getProperty("IPTV_MAT_UPLOAD_KEY_ALIAS")
    def releaseKeyPassword = project.findProperty("IPTV_MAT_UPLOAD_KEY_PASSWORD") ?: System.getenv("IPTV_MAT_UPLOAD_KEY_PASSWORD") ?: releaseProperties.getProperty("IPTV_MAT_UPLOAD_KEY_PASSWORD")

    defaultConfig {
        applicationId "app.vercel.iptvmatplayer"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 81
        versionName "8.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                storeFile rootProject.file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            debuggable true
        }
        release {
            debuggable false
            minifyEnabled true
            shrinkResources true
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.media3:media3-exoplayer:1.4.1"
    implementation "androidx.media3:media3-exoplayer-hls:1.4.1"
    implementation "androidx.media3:media3-ui:1.4.1"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
