services:
  - type: web
    name: iptv-mat-backend-v6-6
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_BASE_URL
        value: https://iptv-mat-backend-v6-6.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://iptv-mat-player.vercel.app,capacitor://localhost,http://localhost,https://localhost,http://localhost:3000,http://localhost:4173,http://localhost:5173
